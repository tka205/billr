<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billr — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --ink:#0f0e0c; --paper:#f5f0e8; --cream:#ede8dc; --gold:#c9a84c; --rust:#b85c38; --muted:#7a7060; --white:#fdfaf4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Outfit',sans-serif;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(184,92,56,0.06) 0%, transparent 60%);
  }
  .card {
    background:var(--white); border-radius:12px; padding:3rem;
    width:100%; max-width:420px;
    box-shadow:0 24px 80px rgba(0,0,0,0.4); position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--gold), var(--rust));
  }
  .logo { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--ink); text-align:center; margin-bottom:0.3rem; }
  .logo span { color:var(--gold); font-style:italic; }
  .subtitle { text-align:center; font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:2rem; }
  .field-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.2rem; }
  label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); font-family:'DM Mono',monospace; }
  input { background:var(--paper); border:1.5px solid var(--cream); border-radius:6px; padding:0.75rem 1rem; font-family:'Outfit',sans-serif; font-size:0.95rem; color:var(--ink); width:100%; transition:border-color 0.2s; }
  input:focus { outline:none; border-color:var(--gold); }
  .btn { width:100%; background:var(--ink); color:var(--white); border:none; border-radius:8px; padding:0.9rem; font-size:1rem; font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
  .btn:hover { background:#2a2820; transform:translateY(-1px); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .msg { border-radius:6px; padding:0.7rem 1rem; font-size:0.85rem; margin-bottom:1rem; display:none; }
  .msg.error { background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; }
  .msg.success { background:#f0fdf4; border:1px solid #86efac; color:#15803d; }
  .mode-title { font-family:'DM Serif Display',serif; font-size:1.1rem; text-align:center; margin-bottom:1.5rem; }
  .back-link { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--muted); }
  .back-link a { color:var(--gold); cursor:pointer; text-decoration:none; font-weight:500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bill<span>r</span></div>
  <div class="subtitle">Account Security</div>

  <!-- Request reset -->
  <div id="requestForm">
    <div class="mode-title">Reset your password</div>
    <div id="reqMsg" class="msg"></div>
    <div class="field-group">
      <label>Your Email</label>
      <input id="resetEmail" type="email" placeholder="you@example.com">
    </div>
    <button class="btn" onclick="requestReset()">Send Reset Link</button>
    <div class="back-link"><a href="/index.html">← Back to login</a></div>
  </div>

  <!-- Set new password (after clicking email link) -->
  <div id="newPassForm" style="display:none">
    <div class="mode-title">Choose a new password</div>
    <div id="newMsg" class="msg"></div>
    <div class="field-group">
      <label>New Password</label>
      <input id="newPassword" type="password" placeholder="Min 6 characters">
    </div>
    <div class="field-group">
      <label>Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="Repeat password">
    </div>
    <button class="btn" onclick="updatePassword()">Update Password</button>
  </div>
</div>

<script>
  const sb = supabase.createClient(
    'https://cgxzxsjknaluibaglrzy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneHp4c2prbmFsdWliYWdscnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjkyOTgsImV4cCI6MjA4ODc0NTI5OH0.n6c4ryX9pBGe5DGPfy1UFJWylLFHXUHjJJuRiEXJDA0'
  );

  // Check if this is a password recovery redirect
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  if (params.get('type') === 'recovery') {
    sb.auth.setSession({
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token')
    }).then(() => {
      document.getElementById('requestForm').style.display = 'none';
      document.getElementById('newPassForm').style.display = 'block';
    });
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  async function requestReset() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return showMsg('reqMsg', 'error', 'Please enter your email.');
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://billr-gray.vercel.app/reset-password.html'
    });
    if (error) return showMsg('reqMsg', 'error', error.message);
    showMsg('reqMsg', 'success', 'Reset link sent! Check your email.');
  }

  async function updatePassword() {
    const pass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (!pass || pass.length < 6) return showMsg('newMsg', 'error', 'Password must be at least 6 characters.');
    if (pass !== confirm) return showMsg('newMsg', 'error', 'Passwords do not match.');
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) return showMsg('newMsg', 'error', error.message);
    showMsg('newMsg', 'success', 'Password updated! Redirecting...');
    setTimeout(() => window.location.href = '/app.html', 2000);
  }
</script>
</body>
</html>
