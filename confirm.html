<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billr — Confirming your account</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --ink:#0f0e0c; --paper:#f5f0e8; --gold:#c9a84c; --rust:#b85c38; --muted:#7a7060; --white:#fdfaf4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Outfit',sans-serif;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(184,92,56,0.06) 0%, transparent 60%);
  }
  .card {
    background:var(--white); border-radius:12px; padding:3rem;
    width:100%; max-width:420px; text-align:center;
    box-shadow:0 24px 80px rgba(0,0,0,0.4); position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--gold), var(--rust));
  }
  .logo { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--ink); margin-bottom:2rem; }
  .logo span { color:var(--gold); font-style:italic; }
  .icon { font-size:3rem; margin-bottom:1rem; }
  .title { font-family:'DM Serif Display',serif; font-size:1.4rem; margin-bottom:0.5rem; }
  .message { font-size:0.9rem; color:var(--muted); line-height:1.6; margin-bottom:2rem; }
  .btn {
    display:inline-block; background:var(--ink); color:var(--white);
    border:none; border-radius:8px; padding:0.9rem 2rem;
    font-size:0.95rem; font-family:'Outfit',sans-serif; font-weight:600;
    cursor:pointer; transition:all 0.2s; text-decoration:none;
  }
  .btn:hover { background:#2a2820; transform:translateY(-1px); }
  .spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:1rem; }
  .spinner {
    width:40px; height:40px;
    border:3px solid var(--paper); border-top-color:var(--gold);
    border-radius:50%; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner-text { font-size:0.9rem; color:var(--muted); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bill<span>r</span></div>
  <div id="content">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-text">Confirming your account...</div>
    </div>
  </div>
</div>

<script>
  const sb = supabase.createClient(
    'https://cgxzxsjknaluibaglrzy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneHp4c2prbmFsdWliYWdscnp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjkyOTgsImV4cCI6MjA4ODc0NTI5OH0.n6c4ryX9pBGe5DGPfy1UFJWylLFHXUHjJJuRiEXJDA0'
  );

  async function handleConfirmation() {
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const accessToken = params.get('access_token');
    const type = params.get('type');

    // Also check query params (some Supabase versions use these)
    const queryParams = new URLSearchParams(window.location.search);
    const code = queryParams.get('code');

    if (code) {
      // PKCE flow
      const { error } = await sb.auth.exchangeCodeForSession(code);
      if (!error) return showSuccess();
      return showError();
    }

    if (accessToken && type === 'signup') {
      const { error } = await sb.auth.setSession({
        access_token: accessToken,
        refresh_token: params.get('refresh_token')
      });
      if (!error) return showSuccess();
      return showError();
    }

    if (type === 'recovery') {
      // Password reset flow
      window.location.href = '/reset-password.html' + window.location.hash;
      return;
    }

    // If already logged in just redirect
    const { data } = await sb.auth.getSession();
    if (data.session) return showSuccess();

    showError();
  }

  function showSuccess() {
    document.getElementById('content').innerHTML = `
      <div class="icon">✅</div>
      <div class="title">Email Confirmed!</div>
      <div class="message">Your account is ready. Click below to start generating professional quotes.</div>
      <a href="/app.html" class="btn">Go to Billr →</a>
    `;
  }

  function showError() {
    document.getElementById('content').innerHTML = `
      <div class="icon">⚠️</div>
      <div class="title">Something went wrong</div>
      <div class="message">This confirmation link may have expired. Try signing in — if your email is confirmed you'll get straight in.</div>
      <a href="/index.html" class="btn">Back to Login</a>
    `;
  }

  handleConfirmation();
</script>
</body>
</html>
